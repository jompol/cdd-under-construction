<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART BMN Dashboard - อยู่ระหว่างปรับปรุง</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #e2e8f0;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 640px;
      animation: fadeInUp 0.8s ease-out;
    }

    .logo-section {
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
    }

    .logo-icon svg {
      width: 44px;
      height: 44px;
      fill: white;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 2.5rem;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
      margin-bottom: 2rem;
    }

    .gear-icon {
      margin-bottom: 1.5rem;
    }

    .gear-icon svg {
      width: 56px;
      height: 56px;
      color: #fbbf24;
      animation: spin 8s linear infinite;
    }

    .status-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fbbf24;
      margin-bottom: 0.75rem;
    }

    .status-message {
      font-size: 1rem;
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 60%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 3px;
      animation: progress 2s ease-in-out infinite;
    }

    .contact-info {
      font-size: 0.875rem;
      color: #64748b;
    }

    .contact-info a {
      color: #60a5fa;
      text-decoration: none;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    .org-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 2rem;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(59, 130, 246, 0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes progress {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(60%); }
      100% { transform: translateX(200%); }
    }

    @keyframes float {
      from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      to { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 640px) {
      .container { padding: 1.5rem; }
      h1 { font-size: 1.35rem; }
      .status-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>
      </div>
      <h1>SMART BMN Executive Dashboard</h1>
      <div class="subtitle">ระบบแดชบอร์ดข้อมูลสารสนเทศชุมชน สำหรับผู้บริหาร</div>
    </div>

    <div class="status-card">
      <div class="gear-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>

      <div class="status-title">อยู่ระหว่างปรับปรุงระบบ</div>
      <div class="status-message">
        ขณะนี้ระบบกำลังอยู่ระหว่างการปรับปรุงและพัฒนา<br>
        เพื่อให้บริการที่ดียิ่งขึ้น กรุณากลับมาใหม่ในภายหลัง
      </div>

      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="contact-info">
      หากต้องการความช่วยเหลือ กรุณาติดต่อผู้ดูแลระบบ
    </div>

    <div class="org-badge">
      กรมการพัฒนาชุมชน กระทรวงมหาดไทย
    </div>
  </div>

  <script>
    // Create floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
      particle.style.animationDelay = (Math.random() * 10) + 's';
      particle.style.width = particle.style.height = (Math.random() * 4 + 2) + 'px';
      container.appendChild(particle);
    }
  </script>
</body>
</html>
